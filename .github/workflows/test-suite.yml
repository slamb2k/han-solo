name: 🧪 Test Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Quick syntax and linting checks
  quick-checks:
    name: 🔍 Quick Checks
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup Environment
        run: |
          # Install ShellCheck
          sudo apt-get update
          sudo apt-get install -y shellcheck
          
      - name: 📋 Syntax Check
        run: |
          echo "Checking shell script syntax..."
          for script in scripts/*.sh tests/**/*.sh; do
            if [ -f "$script" ]; then
              echo "  Checking $script"
              bash -n "$script"
            fi
          done
          
      - name: 🔎 ShellCheck Linting
        run: |
          echo "Running ShellCheck on all scripts..."
          find scripts tests -name "*.sh" -type f -exec shellcheck {} +
          
      - name: 📊 Report
        if: always()
        run: |
          echo "✅ Quick checks completed"

  # Regression tests to ensure bugs stay fixed
  regression-tests:
    name: 🔄 Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: 🧪 Run Regression Tests
        run: |
          chmod +x tests/regression/*.test.sh tests/run-tests.sh
          ./tests/run-tests.sh regression || exit 1
          
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: /tmp/test_output.log
          retention-days: 7

  # Integration tests on multiple platforms
  integration-tests:
    name: 🔗 Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    needs: quick-checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup Git
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
          
      - name: 🔑 Setup GitHub CLI
        run: |
          # GitHub CLI is pre-installed on runners
          gh --version
          
      - name: 🧪 Test ship --check
        run: |
          ./scripts/ship-core.sh --check || [ $? -eq 1 ]
          
      - name: 🧪 Test scrub --dry-run
        run: |
          ./scripts/scrub-core.sh --dry-run
          
      - name: 🧪 Test fresh
        run: |
          ./scripts/fresh-core.sh test-branch-${{ github.run_number }}
          git branch -d test-branch-${{ github.run_number }}
          
      - name: 📊 Report
        if: always()
        run: |
          echo "✅ Integration tests completed on ${{ matrix.os }}"

  # Performance tests
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [regression-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
          
      - name: ⏱️ Measure ship --check performance
        run: |
          start=$(date +%s%3N)
          timeout 5 ./scripts/ship-core.sh --check || true
          end=$(date +%s%3N)
          duration=$((end - start))
          echo "ship --check took ${duration}ms"
          if [ $duration -gt 5000 ]; then
            echo "⚠️ Warning: ship --check took more than 5 seconds"
            exit 1
          fi
          
      - name: ⏱️ Measure scrub performance
        run: |
          start=$(date +%s%3N)
          timeout 3 ./scripts/scrub-core.sh --dry-run
          end=$(date +%s%3N)
          duration=$((end - start))
          echo "scrub --dry-run took ${duration}ms"
          if [ $duration -gt 3000 ]; then
            echo "⚠️ Warning: scrub took more than 3 seconds"
            exit 1
          fi

  # Comprehensive test report
  test-report:
    name: 📊 Test Report
    runs-on: ubuntu-latest
    if: always()
    needs: [quick-checks, regression-tests, integration-tests, performance-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: 📈 Generate Summary
        run: |
          echo "# 🧪 Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check job statuses
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.quick-checks.result }}" == "success" ]; then
            echo "| Quick Checks | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Quick Checks | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.regression-tests.result }}" == "success" ]; then
            echo "| Regression Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Regression Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "| Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Integration Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.performance-tests.result }}" == "success" ]; then
            echo "| Performance Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Performance Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Syntax validation for all shell scripts" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ShellCheck linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Regression tests for fixed bugs" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cross-platform integration tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Performance benchmarks" >> $GITHUB_STEP_SUMMARY
          
      - name: 🚦 Set Final Status
        run: |
          if [ "${{ needs.quick-checks.result }}" != "success" ] || \
             [ "${{ needs.regression-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.performance-tests.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi