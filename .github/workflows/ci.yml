name: CI
on:
  push:
    branches: ['main']  # Only run on push to main (when PR merges)
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Manual release version (optional, e.g., 1.2.0)'
        required: false
        type: string

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: "đź§ą Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Check formatting âś¨"
        run: pnpm run format:check --if-present || pnpm run format --if-present

  lint:
    name: "đź”Ž Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Run linting đź§Ş"
        run: pnpm run lint --if-present

  typecheck:
    name: "đź§  Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Type checking đź§©"
        run: pnpm run typecheck --if-present

  build:
    name: "đź› ď¸Ź Build"
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Building project đźŹ—ď¸Ź"
        run: pnpm run build --if-present
      - name: "Upload build artifacts"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
            .next/
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: "đź“¦ Release"
    runs-on: ubuntu-latest
    needs: [build]
    # Only run on pushes to main branch or manual workflow dispatch, not on PRs
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write  # Required for creating releases
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      
      - name: "Generate version đźŹ·ď¸Ź"
        id: version
        run: |
          # Use manual version if provided, otherwise generate based on date and run number
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
            echo "đź“Ś Using manual version: $VERSION"
          else
            VERSION="$(date +%Y.%m.%d)-${{ github.run_number }}"
            echo "đź“Ś Generated version: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: "Update package version đź“ť"
        run: |
          cd installer
          # Update package.json with the new version
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          echo "âś… Updated package.json to version ${{ steps.version.outputs.version }}"
      
      - name: "Publish to NPM đźš€"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm authentication
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          
          cd installer
          # Install dependencies
          npm ci
          
          # Publish to npm
          npm publish --access public
          
          echo "âś… Published han-solo-installer@${{ steps.version.outputs.version }} to NPM"
      
      - name: "Create GitHub Release đźš€"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          
          # Generate release notes with commit history
          echo "Automated release of han-solo Claude Code tools." > release_notes.md
          echo "" >> release_notes.md
          echo "## đź“¦ NPM Package" >> release_notes.md
          echo "" >> release_notes.md
          echo "This version is available on NPM: [\`han-solo-installer@${VERSION}\`](https://www.npmjs.com/package/han-solo-installer/v/${VERSION})" >> release_notes.md
          echo "" >> release_notes.md
          echo "## đź“ť Changes Included" >> release_notes.md
          echo "" >> release_notes.md
          
          # Get commits since last tag or last 10 commits
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "*Recent commits (up to 10):*" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%an)" -10 >> release_notes.md
          else
            echo "*Commits since ${LAST_TAG}:*" >> release_notes.md
            echo "" >> release_notes.md
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%an)" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "## đź“Ą Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Interactive Installer (Recommended)" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "npx han-solo-installer@${VERSION}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Curl Installation (Legacy)" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "# Project-scoped" >> release_notes.md
          echo "curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash" >> release_notes.md
          echo "" >> release_notes.md
          echo "# Global" >> release_notes.md
          echo "curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash -s -- --global" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "## đźŽŻ What's Included" >> release_notes.md
          echo "- **Interactive TUI** - Professional installer with arrow key navigation" >> release_notes.md
          echo "- **Status Lines** - Real-time git status in your terminal" >> release_notes.md
          echo "- **git-shipper** - Solo-first PR shipping workflow" >> release_notes.md
          echo "- **/ship** - Ship code through governed fast-path" >> release_notes.md
          echo "- **/launch** - Start clean feature branches" >> release_notes.md
          echo "- **/scrub** - Automatic branch cleanup" >> release_notes.md
          echo "- **/health** - Check repository health" >> release_notes.md
          echo "" >> release_notes.md
          echo "## đź”— Links" >> release_notes.md
          echo "- [NPM Package](https://www.npmjs.com/package/han-solo-installer/v/${VERSION})" >> release_notes.md
          if [ -n "$LAST_TAG" ]; then
            echo "- [Compare Changes](https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${VERSION_TAG})" >> release_notes.md
          fi
          echo "- [All Releases](https://github.com/${{ github.repository }}/releases)" >> release_notes.md
          echo "- [Documentation](https://github.com/${{ github.repository }}#readme)" >> release_notes.md
          
          # Create release with gh CLI (available in GitHub Actions by default)
          gh release create "$VERSION_TAG" \
            --title "Han-Solo Claude Tools ${VERSION_TAG}" \
            --notes-file release_notes.md
          
          echo "âś… Release $VERSION_TAG created successfully!"
