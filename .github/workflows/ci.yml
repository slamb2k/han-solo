name: CI
on:
  push:
    branches: ['main']  # Only run on push to main (when PR merges)
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: "🧹 Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Check formatting ✨"
        run: pnpm run format:check --if-present || pnpm run format --if-present

  lint:
    name: "🔎 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Run linting 🧪"
        run: pnpm run lint --if-present

  typecheck:
    name: "🧠 Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Type checking 🧩"
        run: pnpm run typecheck --if-present

  build:
    name: "🛠️ Build"
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Building project 🏗️"
        run: pnpm run build --if-present
      - name: "Upload build artifacts"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
            .next/
          retention-days: 7
          if-no-files-found: ignore

  release:
    name: "📦 Release"
    runs-on: ubuntu-latest
    needs: [build]
    # Only run on pushes to main branch, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write  # Required for creating releases
    steps:
      - uses: actions/checkout@v4
      
      - name: "Generate version 🏷️"
        id: version
        run: |
          # Generate semantic version based on date and run number
          VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Generated version: $VERSION"
      
      - name: "Create release archive 📦"
        run: |
          echo "📁 Preparing release archive..."
          
          # Create a clean directory for the release
          mkdir -p release-temp
          
          # Copy .claude contents, excluding settings.local.json
          if [ -d ".claude" ]; then
            # Copy agents directory
            [ -d ".claude/agents" ] && cp -r .claude/agents release-temp/
            # Copy commands directory
            [ -d ".claude/commands" ] && cp -r .claude/commands release-temp/
            # Copy README.md to commands/han-solo directory for documentation
            [ -f "README.md" ] && mkdir -p release-temp/commands/han-solo && cp README.md release-temp/commands/han-solo/README.md
            # Explicitly exclude settings.local.json
            find release-temp -name "settings.local.json" -delete 2>/dev/null || true
          else
            echo "⚠️ Warning: .claude directory not found"
            exit 1
          fi
          
          # Create the zip file
          cd release-temp
          zip -r ../han-solo-claude-${{ steps.version.outputs.version }}.zip . -q
          cd ..
          
          # Create checksums
          sha256sum han-solo-claude-*.zip > SHA256SUMS
          
          echo "✅ Archive created successfully"
          ls -lh han-solo-claude-*.zip SHA256SUMS
      
      - name: "Create GitHub Release 🚀"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Create release with gh CLI (available in GitHub Actions by default)
          gh release create "$VERSION" \
            --title "Han-Solo Claude Tools $VERSION" \
            --notes "Automated release of han-solo Claude Code tools.
          
          ## 📥 Installation
          
          ### Project-scoped (recommended)
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash
          \`\`\`
          
          ### Global (all projects)
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash -s -- --global
          \`\`\`
          
          ### Install specific version
          \`\`\`bash
          # Project-scoped
          TAG=$VERSION curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash
          
          # Global
          TAG=$VERSION curl -fsSL https://raw.githubusercontent.com/slamb2k/han-solo/main/scripts/install.sh | bash -s -- --global
          \`\`\`
          
          ## 📦 Contents
          - **bootstrap-guardian** agent - Repository bootstrapping with governance
          - **git-shipper** agent - Solo-first PR shipping workflow
          - **/bootstrap** command - Set up repository with quality gates
          - **/ship** command - Ship code through governed fast-path
          
          ## 🔍 Verification
          The release includes SHA256 checksums for integrity verification." \
            han-solo-claude-*.zip \
            SHA256SUMS
          
          echo "✅ Release $VERSION created successfully!"
